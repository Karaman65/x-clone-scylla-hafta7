<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Clone</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--surface:#16181c;--border:#2f3336;--text:#e7e9ea;--text-secondary:#71767b;--accent:#1d9bf0;--accent-hover:#1a8cd8;--danger:#f4212e;--like-pink:#f91880;--success:#00ba7c;--overlay:rgba(91,112,131,0.4)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,textarea{font-family:inherit;outline:none}
.app{display:flex;max-width:1280px;margin:0 auto;min-height:100vh}

/* Sidebar */
.sidebar{width:275px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:0 12px;border-right:1px solid var(--border)}
.sidebar .logo{padding:12px;margin-bottom:4px}
.sidebar .logo svg{width:32px;height:32px;fill:var(--text)}
.nav-item{display:flex;align-items:center;gap:20px;padding:12px;border-radius:9999px;font-size:20px;color:var(--text);transition:background .2s;margin-bottom:4px;cursor:pointer}
.nav-item:hover{background:rgba(231,233,234,0.1)}
.nav-item.active{font-weight:700}
.nav-item svg{width:26px;height:26px;fill:var(--text)}
.tweet-btn-sidebar{background:var(--accent);color:#fff;font-weight:700;font-size:17px;padding:16px 0;border-radius:9999px;width:100%;margin-top:16px;transition:background .2s}
.tweet-btn-sidebar:hover{background:var(--accent-hover)}
.user-card{margin-top:auto;padding:12px;border-radius:9999px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .2s;margin-bottom:12px}
.user-card:hover{background:rgba(231,233,234,0.1)}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;flex-shrink:0}
.avatar.lg{width:48px;height:48px;font-size:20px}
.user-info .name{font-weight:700;font-size:15px}
.user-info .handle{color:var(--text-secondary);font-size:15px}

/* Main Feed */
.main{flex:1;border-right:1px solid var(--border);max-width:600px;min-width:0}
.main-header{position:sticky;top:0;z-index:10;background:rgba(0,0,0,0.65);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0}
.main-header h2{font-size:20px;font-weight:700;padding:12px 16px}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:16px 0;color:var(--text-secondary);font-weight:500;cursor:pointer;position:relative;transition:background .2s}
.tab:hover{background:rgba(231,233,234,0.03)}
.tab.active{color:var(--text);font-weight:700}
.tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:56px;height:4px;background:var(--accent);border-radius:2px}

/* Compose */
.compose{display:flex;padding:16px;border-bottom:1px solid var(--border);gap:12px}
.compose textarea{flex:1;background:transparent;border:none;color:var(--text);font-size:20px;resize:none;min-height:52px;padding:8px 0}
.compose textarea::placeholder{color:var(--text-secondary)}
.compose-actions{display:flex;justify-content:space-between;align-items:center;padding:0 16px 12px 68px;border-bottom:1px solid var(--border)}
.compose-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.char-count{color:var(--text-secondary);font-size:13px}
.char-count.warn{color:#ffd700}
.char-count.over{color:var(--danger)}
.tweet-btn{background:var(--accent);color:#fff;font-weight:700;font-size:15px;padding:8px 20px;border-radius:9999px;transition:all .2s}
.tweet-btn:hover{background:var(--accent-hover)}
.tweet-btn:disabled{opacity:.5;cursor:not-allowed}

/* Tweet */
.tweet{display:flex;gap:12px;padding:16px;border-bottom:1px solid var(--border);transition:background .2s;cursor:pointer}
.tweet:hover{background:rgba(231,233,234,0.03)}
.tweet-body{flex:1;min-width:0}
.tweet-header{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.tweet-header .name{font-weight:700;font-size:15px}
.tweet-header .handle,.tweet-header .time{color:var(--text-secondary);font-size:15px}
.tweet-header .dot{color:var(--text-secondary);margin:0 4px}
.tweet-content{font-size:15px;line-height:1.4;word-wrap:break-word;margin-bottom:12px}
.tweet-content .hashtag{color:var(--accent);cursor:pointer}
.tweet-actions{display:flex;gap:0;justify-content:space-between;max-width:425px}
.tweet-action{display:flex;align-items:center;gap:4px;color:var(--text-secondary);font-size:13px;padding:8px 12px;border-radius:9999px;transition:all .2s}
.tweet-action:hover{color:var(--accent);background:rgba(29,155,240,0.1)}
.tweet-action.like:hover,.tweet-action.like.liked{color:var(--like-pink)}
.tweet-action.like:hover{background:rgba(249,24,128,0.1)}
.tweet-action svg{width:18px;height:18px;fill:currentColor}

/* Right Sidebar */
.right-sidebar{width:350px;padding:0 24px;position:sticky;top:0;height:100vh;overflow-y:auto}
.search-box{position:sticky;top:0;padding:12px 0;background:var(--bg);z-index:5}
.search-box input{width:100%;background:var(--surface);border:1px solid transparent;border-radius:9999px;padding:12px 20px 12px 48px;color:var(--text);font-size:15px;transition:all .2s}
.search-box input:focus{border-color:var(--accent);background:transparent}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);fill:var(--text-secondary);width:18px;height:18px}
.widget{background:var(--surface);border-radius:16px;margin-bottom:16px;overflow:hidden}
.widget-title{font-size:20px;font-weight:800;padding:12px 16px}
.widget-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;transition:background .2s;cursor:pointer}
.widget-item:hover{background:rgba(231,233,234,0.03)}
.widget-item .trend-label{font-size:13px;color:var(--text-secondary)}
.widget-item .trend-name{font-weight:700;font-size:15px;margin:2px 0}
.widget-item .trend-count{font-size:13px;color:var(--text-secondary)}
.follow-btn{background:var(--text);color:var(--bg);font-weight:700;font-size:14px;padding:8px 16px;border-radius:9999px;transition:opacity .2s}
.follow-btn:hover{opacity:.9}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay);z-index:100;align-items:flex-start;justify-content:center;padding-top:5vh}
.modal-overlay.show{display:flex}
.modal{background:var(--bg);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:16px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-close{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--text);font-size:20px;transition:background .2s}
.modal-close:hover{background:rgba(231,233,234,0.1)}

/* Profile */
.profile-header{padding:16px;border-bottom:1px solid var(--border)}
.profile-banner{height:200px;background:linear-gradient(135deg,#1d4e89,#1d9bf0);border-radius:4px;margin-bottom:-40px}
.profile-top{display:flex;justify-content:space-between;align-items:flex-start;padding:0 16px}
.profile-avatar{width:134px;height:134px;border-radius:50%;background:var(--accent);border:4px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:800;color:#fff;margin-top:-67px}
.profile-info{padding:12px 16px}
.profile-info .display-name{font-size:20px;font-weight:800}
.profile-info .username{color:var(--text-secondary);font-size:15px}
.profile-info .bio{margin-top:12px;font-size:15px;line-height:1.4}
.profile-stats{display:flex;gap:20px;margin-top:12px}
.profile-stats span{font-size:14px;color:var(--text-secondary)}
.profile-stats strong{color:var(--text);font-weight:700}

/* Auth Screen */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{background:var(--bg);border-radius:16px;padding:32px;width:100%;max-width:440px}
.auth-card h1{font-size:32px;font-weight:800;margin-bottom:8px}
.auth-card p{color:var(--text-secondary);margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px}
.form-group input{width:100%;background:transparent;border:1px solid var(--border);border-radius:4px;padding:12px 16px;color:var(--text);font-size:16px;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.auth-btn{width:100%;background:var(--text);color:var(--bg);font-weight:700;font-size:17px;padding:14px;border-radius:9999px;margin-top:8px;transition:opacity .2s}
.auth-btn:hover{opacity:.9}
.auth-switch{text-align:center;margin-top:16px;color:var(--text-secondary);font-size:14px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Loading */
.loader{text-align:center;padding:24px;color:var(--text-secondary)}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:40px 16px;color:var(--text-secondary)}
.empty svg{width:48px;height:48px;fill:var(--text-secondary);margin-bottom:12px}
.hidden{display:none!important}

@media(max-width:1024px){.right-sidebar{display:none}}
@media(max-width:768px){.sidebar{width:72px}.sidebar .nav-text,.sidebar .tweet-btn-sidebar span,.sidebar .user-info{display:none}.sidebar .tweet-btn-sidebar{padding:16px;font-size:0}.nav-item{justify-content:center;gap:0;padding:12px}}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="auth-screen">
<div class="auth-card">
  <svg viewBox="0 0 24 24" style="width:40px;height:40px;fill:var(--text);margin-bottom:24px"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
  <h1 id="authTitle">Hesabına katıl</h1>
  <p id="authSubtitle">X Clone'a hoş geldin!</p>
  <form id="authForm">
    <div class="form-group"><label>Kullanıcı Adı</label><input type="text" id="authUsername" placeholder="kullanici_adi" required></div>
    <div class="form-group"><label>Şifre</label><input type="password" id="authPassword" placeholder="******" required></div>
    <div class="form-group" id="displayNameGroup"><label>Görünen Ad</label><input type="text" id="authDisplayName" placeholder="Ad Soyad" required></div>
    <div class="form-group" id="bioGroup"><label>Biyografi (opsiyonel)</label><input type="text" id="authBio" placeholder="Kendinizi tanımlayın..."></div>
    <button type="submit" class="auth-btn" id="authBtn">Hesap oluştur</button>
  </form>
  <div class="auth-switch">Zaten hesabın var mı? <a href="#" id="switchAuth">Giriş yap</a></div>
</div>
</div>

<!-- MAIN APP -->
<div id="appMain" class="app hidden">

<!-- LEFT SIDEBAR -->
<nav class="sidebar">
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
  <div class="nav-item active" data-page="home"><svg viewBox="0 0 24 24"><path d="M21.591 7.146L12.52 1.157c-.316-.21-.724-.21-1.04 0l-9.071 5.99c-.26.173-.409.456-.409.757v13.183c0 .502.418.913.929.913h5.954a.93.93 0 00.929-.913v-7.075h3.176v7.075c0 .502.418.913.929.913h5.954a.93.93 0 00.929-.913V7.903c0-.3-.15-.584-.41-.757z"/></svg><span class="nav-text">Anasayfa</span></div>
  <div class="nav-item" data-page="explore"><svg viewBox="0 0 24 24"><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"/></svg><span class="nav-text">Keşfet</span></div>
  <div class="nav-item" data-page="profile"><svg viewBox="0 0 24 24"><path d="M5.651 19h12.698c-.337-1.8-1.023-3.21-1.945-4.19C15.318 13.65 13.838 13 12 13s-3.317.65-4.404 1.81c-.922.98-1.608 2.39-1.945 4.19zm.486-5.56C7.627 11.85 9.648 11 12 11s4.373.85 5.863 2.44c1.477 1.58 2.366 3.8 2.632 6.46l.11 1.1H3.395l.11-1.1c.266-2.66 1.155-4.88 2.632-6.46zM12 4c-1.105 0-2 .9-2 2s.895 2 2 2 2-.9 2-2-.895-2-2-2zM8 6c0-2.21 1.791-4 4-4s4 1.79 4 4-1.791 4-4 4-4-1.79-4-4z"/></svg><span class="nav-text">Profil</span></div>
  <button class="tweet-btn-sidebar" onclick="openCompose()"><span>Gönder</span></button>
  
  <div class="user-card" id="sidebarUser" style="margin-top:auto;margin-bottom:0">
    <div class="avatar" id="sidebarAvatar">?</div>
    <div class="user-info"><div class="name" id="sidebarName">—</div><div class="handle" id="sidebarHandle">@—</div></div>
  </div>
  <button onclick="logout()" style="margin-bottom:12px;background:none;color:var(--danger);font-weight:700;padding:12px;border-radius:9999px;transition:background 0.2s;text-align:left;display:flex;align-items:center;gap:12px;" class="nav-item">
    <svg viewBox="0 24" style="width:26px;fill:currentColor"><path d="M4 4h6v2H6v12h4v2H4V4zm11.59 14.59L20.17 13H9v-2h11.17l-4.59-4.59L17 5l8 7-8 7-1.41-1.41z"/></svg>
    <span class="nav-text">Çıkış Yap</span>
  </button>
</nav>

<!-- MAIN CONTENT -->
<main class="main">
  <!-- HOME -->
  <div id="homePage">
    <div class="main-header">
      <h2>Anasayfa</h2>
      <div class="tabs">
        <div class="tab active" id="tabGlobal" onclick="switchTimeline('global')">Sana özel</div>
        <div class="tab" id="tabFollowing" onclick="switchTimeline('following')">Takip ediliyor</div>
      </div>
    </div>
    <div class="compose" id="homeCompose">
      <div class="avatar" id="composeAvatar">?</div>
      <div style="flex:1">
        <textarea id="tweetInput" placeholder="Neler oluyor?" rows="2"></textarea>
        <div class="compose-bottom">
          <div class="char-count" id="charCount">280</div>
          <button class="tweet-btn" id="tweetBtn" onclick="postTweet()" disabled>Gönder</button>
        </div>
      </div>
    </div>
    <div id="timeline"></div>
  </div>

  <!-- EXPLORE -->
  <div id="explorePage" class="hidden">
    <div class="main-header"><h2>Keşfet</h2></div>
    <div style="padding:16px"><div class="form-group"><input type="text" id="hashtagSearch" placeholder="#hashtag ara..." style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9999px;padding:12px 20px;color:var(--text);font-size:15px"></div></div>
    <div id="hashtagResults"></div>
  </div>

  <!-- PROFILE -->
  <div id="profilePage" class="hidden">
    <div class="main-header"><h2 id="profileHeaderName">Profil</h2></div>
    <div class="profile-banner"></div>
    <div class="profile-top"><div class="profile-avatar" id="profileAvatar">?</div></div>
    <div class="profile-info">
      <div class="display-name" id="profileDisplayName">—</div>
      <div class="username" id="profileUsername">@—</div>
      <div class="bio" id="profileBio"></div>
      <div class="profile-stats">
        <span><strong id="profileFollowing">0</strong> Takip edilen</span>
        <span><strong id="profileFollowers">0</strong> Takipçi</span>
      </div>
    </div>
    <div class="tabs"><div class="tab active">Gönderiler</div></div>
    <div id="profileTweets"></div>
  </div>
</main>

<!-- RIGHT SIDEBAR -->
<aside class="right-sidebar">
  <div class="search-box" style="position:relative"><svg class="search-icon" viewBox="0 0 24 24"><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"/></svg><input type="text" placeholder="Ara" id="rightSearch"></div>
  <div class="widget" id="trendingWidget">
    <div class="widget-title">Neler oluyor?</div>
    <div id="trendingList"><div class="widget-item"><div><div class="trend-label">Gündemdekiler</div><div class="trend-name">#ScyllaDB</div></div></div></div>
    <div class="widget-item" style="color:var(--accent);font-size:15px">Daha fazla göster</div>
  </div>
  <div class="widget" id="whoToFollow">
    <div class="widget-title">Kimi takip etmeli</div>
    <div id="suggestedUsers"></div>
  </div>
</aside>
</div>

<!-- COMPOSE MODAL -->
<div class="modal-overlay" id="composeModal">
<div class="modal">
  <div class="modal-header"><button class="modal-close" onclick="closeCompose()">✕</button><button class="tweet-btn" id="modalTweetBtn" onclick="postTweet()" disabled>Gönder</button></div>
  <div class="compose" style="border:none;padding:0">
    <div class="avatar" id="modalAvatar">?</div>
    <div style="flex:1"><textarea id="modalTweetInput" placeholder="Neler oluyor?" rows="4" style="font-size:20px;width:100%;background:transparent;border:none;color:var(--text);resize:none;min-height:120px"></textarea><div class="char-count" id="modalCharCount">280</div></div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let currentUser = null;
let isLogin = false;

// Auth
document.getElementById('switchAuth').onclick = e => {
  e.preventDefault();
  isLogin = !isLogin;
  document.getElementById('authTitle').textContent = isLogin ? 'Giriş yap' : 'Hesabına katıl';
  document.getElementById('authSubtitle').textContent = isLogin ? 'Kullanıcı adınla giriş yap' : 'X Clone\'a hoş geldin!';
  document.getElementById('displayNameGroup').classList.toggle('hidden', isLogin);
  document.getElementById('authDisplayName').required = !isLogin;
  document.getElementById('bioGroup').classList.toggle('hidden', isLogin);
  document.getElementById('authBtn').textContent = isLogin ? 'Giriş yap' : 'Hesap oluştur';
  document.getElementById('switchAuth').textContent = isLogin ? 'Hesap oluştur' : 'Giriş yap';
};

document.getElementById('authForm').onsubmit = async e => {
  e.preventDefault();
  const username = document.getElementById('authUsername').value.trim();
  const password = document.getElementById('authPassword').value.trim();
  const displayName = document.getElementById('authDisplayName').value.trim();
  const bio = document.getElementById('authBio').value.trim();
  if (isLogin) {
    try {
      const res = await fetch(`${API}/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username, password}) });
      const data = await res.json();
      if (!res.ok) { toast(data.error || 'Giriş başarısız!'); return; }
      currentUser = { ...data, followers_count:0, following_count:0 };
      enterApp();
    } catch(e) { toast('Bağlantı hatası!'); }
  } else {
    try {
      const res = await fetch(`${API}/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username, display_name:displayName, password, bio}) });
      const data = await res.json();
      if (res.status === 409) { toast('Bu kullanıcı adı alınmış!'); return; }
      if (!res.ok) { toast(data.error || 'Hata!'); return; }
      currentUser = { user_id:data.user_id, username, display_name:displayName, bio, followers_count:0, following_count:0 };
      enterApp();
    } catch(e) { toast('Bağlantı hatası!'); }
  }
};

function enterApp() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('appMain').classList.remove('hidden');
  const initial = (currentUser.display_name || currentUser.username)[0].toUpperCase();
  document.querySelectorAll('#sidebarAvatar,#composeAvatar,#modalAvatar').forEach(el => el.textContent = initial);
  document.getElementById('sidebarName').textContent = currentUser.display_name;
  document.getElementById('sidebarHandle').textContent = '@' + currentUser.username;
  navigateTo('home');
}

function logout() {
  currentUser = null;
  document.getElementById('appMain').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
  // clear inputs
  document.getElementById('authUsername').value = '';
  document.getElementById('authPassword').value = '';
  toast('Çıkış yapıldı.');
}

// Navigation
document.querySelectorAll('.nav-item[data-page]').forEach(item => {
  item.onclick = () => navigateTo(item.dataset.page);
});

function navigateTo(page) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
  ['homePage','explorePage','profilePage'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById(page + 'Page').classList.remove('hidden');
  if (page === 'home') loadTimeline();
  if (page === 'profile') loadProfile();
  if (page === 'explore') {}
}

// Tweet Input
['tweetInput','modalTweetInput'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    const len = this.value.length;
    const remaining = 280 - len;
    const countEl = id === 'tweetInput' ? document.getElementById('charCount') : document.getElementById('modalCharCount');
    const btnEl = id === 'tweetInput' ? document.getElementById('tweetBtn') : document.getElementById('modalTweetBtn');
    countEl.textContent = remaining;
    countEl.className = 'char-count' + (remaining < 20 ? (remaining < 0 ? ' over' : ' warn') : '');
    btnEl.disabled = len === 0 || len > 280;
  });
});

async function postTweet() {
  const input = document.getElementById('tweetInput').value || document.getElementById('modalTweetInput').value;
  if (!input.trim() || input.length > 280) return;
  try {
    const res = await fetch(`${API}/tweets`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:currentUser.user_id, content:input.trim()}) });
    if (res.ok) {
      document.getElementById('tweetInput').value = '';
      document.getElementById('modalTweetInput').value = '';
      document.getElementById('charCount').textContent = '280';
      document.getElementById('modalCharCount').textContent = '280';
      document.getElementById('tweetBtn').disabled = true;
      document.getElementById('modalTweetBtn').disabled = true;
      closeCompose();
      toast('Tweet gönderildi!');
      loadTimeline();
    }
  } catch(e) { toast('Tweet gönderilemedi!'); }
}

function openCompose() { document.getElementById('composeModal').classList.add('show'); }
function closeCompose() { document.getElementById('composeModal').classList.remove('show'); }

// Timeline
let currentTimelineTab = 'global'; // 'global' or 'following'

function switchTimeline(tab) {
  currentTimelineTab = tab;
  document.getElementById('tabGlobal').classList.toggle('active', tab === 'global');
  document.getElementById('tabFollowing').classList.toggle('active', tab === 'following');
  loadTimeline();
}

async function loadTimeline() {
  const el = document.getElementById('timeline');
  el.innerHTML = '<div class="loader"><div class="spinner"></div>Yükleniyor...</div>';
  try {
    const endpoint = currentTimelineTab === 'global' ? `${API}/global/tweets` : `${API}/timeline/${currentUser.user_id}`;
    const res = await fetch(endpoint);
    const data = await res.json();
    if (!data.tweets || data.tweets.length === 0) {
      if (currentTimelineTab === 'following') {
        el.innerHTML = '<div class="empty"><p>Nasıl göründüğünü keşfetmek için sağ taraftan birini takip et!</p></div>';
      } else {
        el.innerHTML = '<div class="empty"><p>Henüz tweet yok. Bir şeyler paylaş!</p></div>';
      }
      return;
    }
    el.innerHTML = data.tweets.map(t => renderTweet(t)).join('');
  } catch(e) { el.innerHTML = '<div class="empty"><p>Yüklenirken hata oluştu.</p></div>'; }
}

function renderTweet(t) {
  const name = t.author_username || t.username || 'user';
  const initial = name[0].toUpperCase();
  const time = timeAgo(new Date(t.created_at));
  const content = (t.content || '').replace(/#(\w+)/g, '<span class="hashtag" onclick="searchHashtag(\'$1\')">#$1</span>');
  return `<div class="tweet">
    <div class="avatar">${initial}</div>
    <div class="tweet-body">
      <div class="tweet-header"><span class="name">${name}</span><span class="handle">@${name}</span><span class="dot">·</span><span class="time">${time}</span></div>
      <div class="tweet-content">${content}</div>
      <div class="tweet-actions">
        <div class="tweet-action"><svg viewBox="0 0 24 24"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.25-.893 4.42-2.491 6.01L12 24l-7.76-7.86C2.644 14.42 1.751 12.25 1.751 10z"/></svg></div>
        <div class="tweet-action like" onclick="likeTweet('${t.tweet_id}',this)"><svg viewBox="0 0 24 24"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91z"/></svg><span>0</span></div>
      </div>
    </div>
  </div>`;
}

async function likeTweet(tweetId, el) {
  try {
    await fetch(`${API}/tweets/${tweetId}/like`, {method:'POST'});
    const res = await fetch(`${API}/tweets/${tweetId}/likes`);
    const data = await res.json();
    el.classList.add('liked');
    el.querySelector('span').textContent = data.like_count;
  } catch(e) {}
}

// Profile
async function loadProfile() {
  try {
    const res = await fetch(`${API}/users/${currentUser.username}`);
    const u = await res.json();
    const initial = (u.display_name || u.username)[0].toUpperCase();
    document.getElementById('profileHeaderName').textContent = u.display_name;
    document.getElementById('profileAvatar').textContent = initial;
    document.getElementById('profileDisplayName').textContent = u.display_name;
    document.getElementById('profileUsername').textContent = '@' + u.username;
    document.getElementById('profileBio').textContent = u.bio || '';
    document.getElementById('profileFollowers').textContent = u.followers_count || 0;
    document.getElementById('profileFollowing').textContent = u.following_count || 0;
    const tres = await fetch(`${API}/users/${u.username}/tweets`);
    const tdata = await tres.json();
    const el = document.getElementById('profileTweets');
    if (!tdata.tweets || tdata.tweets.length === 0) {
      el.innerHTML = '<div class="empty"><p>Henüz tweet yok.</p></div>';
    } else {
      el.innerHTML = tdata.tweets.map(t => renderTweet({...t, author_username:u.username})).join('');
    }
  } catch(e) {}
}

// Hashtag Search
document.getElementById('hashtagSearch').addEventListener('keypress', e => {
  if (e.key === 'Enter') { searchHashtag(e.target.value.replace('#','')); }
});

async function searchHashtag(tag) {
  if (!tag) return;
  navigateTo('explore');
  document.getElementById('hashtagSearch').value = '#' + tag;
  const el = document.getElementById('hashtagResults');
  el.innerHTML = '<div class="loader"><div class="spinner"></div>Aranıyor...</div>';
  try {
    const res = await fetch(`${API}/hashtags/${tag}`);
    const data = await res.json();
    if (!data.tweets || data.tweets.length === 0) {
      el.innerHTML = '<div class="empty"><p>#' + tag + ' için sonuç bulunamadı.</p></div>';
    } else {
      el.innerHTML = '<h3 style="padding:16px;border-bottom:1px solid var(--border)">#' + tag + ' sonuçları</h3>' + data.tweets.map(t => renderTweet({...t, author_username:t.username})).join('');
    }
  } catch(e) { el.innerHTML = '<div class="empty"><p>Arama başarısız.</p></div>'; }
}

// Who to follow
async function loadSuggested() {
  try {
    const res = await fetch(`${API}/allusers`);
    const users = await res.json();
    const el = document.getElementById('suggestedUsers');
    const others = users.filter(u => u.user_id !== currentUser?.user_id).slice(0, 3);
    el.innerHTML = others.map(u => `<div class="widget-item">
      <div style="display:flex;align-items:center;gap:12px"><div class="avatar" style="width:40px;height:40px;font-size:16px">${(u.display_name||u.username)[0].toUpperCase()}</div>
      <div><div style="font-weight:700;font-size:15px">${u.display_name}</div><div style="color:var(--text-secondary);font-size:13px">@${u.username}</div></div></div>
      <button class="follow-btn" onclick="followUser('${u.user_id}',this)">Takip et</button>
    </div>`).join('') || '<div style="padding:16px;color:var(--text-secondary)">Henüz kullanıcı yok</div>';
  } catch(e) {}
}

async function followUser(userId, btn) {
  try {
    await fetch(`${API}/follow`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({follower_id:currentUser.user_id, followee_id:userId})});
    btn.textContent = 'Takip ediliyor';
    btn.style.background = 'transparent';
    btn.style.border = '1px solid var(--border)';
    btn.style.color = 'var(--text)';
    toast('Takip edildi!');
  } catch(e) { toast('Takip edilemedi!'); }
}

// Helpers
function timeAgo(d) {
  const s = Math.floor((Date.now()-d.getTime())/1000);
  if (s < 60) return s + 'sn';
  if (s < 3600) return Math.floor(s/60) + 'dk';
  if (s < 86400) return Math.floor(s/3600) + 'sa';
  return d.toLocaleDateString('tr-TR',{day:'numeric',month:'short'});
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Refresh suggested users periodically after login
const origEnterApp = enterApp;
enterApp = function() {
  origEnterApp();
  setTimeout(loadSuggested, 500);
};
</script>
</body>
</html>
